<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgC2" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11161f"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="glowC2" cx="500" cy="380" r="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ee0c1" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#7ee0c1" stop-opacity="0"/>
    </radialGradient>
    <mask id="bowlC2">
      <rect width="1024" height="1024" fill="black"/>
      <circle cx="470" cy="372" r="112" fill="white"/>
      <circle cx="470" cy="372" r="58" fill="black"/>
    </mask>
    <clipPath id="clipC2"><rect x="470" y="0" width="554" height="1024"/></clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgC2)"/>
  <rect width="1024" height="1024" fill="url(#glowC2)"/>

  <!-- Candlestick stem (longer body) -->
  <rect x="460" y="300" width="10" height="448" rx="5" fill="#7ee0c1"/>
  <rect x="433" y="470" width="64" height="250" rx="8" fill="#7ee0c1"/>
  <!-- Bowl (ink half-ring) -->
  <g clip-path="url(#clipC2)">
    <rect x="358" y="260" width="224" height="224" fill="#e6e7ea" mask="url(#bowlC2)"/>
  </g>
</svg>
